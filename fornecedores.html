<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fornecedores – Casa Personalizada</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<aside class="sidebar">
  <div class="logo-svg-wrap"><img src="img/logo.png" alt="Logo" style="width:150px;height:80px;object-fit:contain;"/></div>
  <nav>
    <a href="relatorio.html">Relatórios</a>
    <a href="pedidos.html">Pedidos</a>
    <a href="insumos.html">Insumos</a>
    <a href="compras.html">Compras</a>
    <a href="produtos.html">Produtos</a>
    <a href="clientes.html">Clientes</a>
    <a href="fornecedores.html" class="active">Fornecedores</a>
    <a href="balanco.html">Balanço</a>
    <a href="financeiro.html">Financeiro</a>
  </nav>
</aside>
<main class="main">
  <h1 class="page-title">Fornecedores</h1>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#7A4A40" stroke-width="1.8"/><path d="M10.5 10.5L14 14" stroke="#7A4A40" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar por nome, e-mail ou vendedor…" oninput="filterData()"/>
    </div>
    <button class="btn" onclick="openNewModal()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg>
      Novo Fornecedor
    </button>
  </div>
  <div class="sort-bar">
    <label>Ordenar:</label>
    <select id="sortSelect" onchange="setSortFromBar()">
      <option value="nome">Nome</option>
      <option value="telefone">Telefone</option>
      <option value="email">E-mail</option>
      <option value="vendedor">Vendedor</option>
      <option value="id_fornecedor">ID</option>
    </select>
    <button onclick="toggleSortDir()" id="sortDirBtn" title="Inverter ordem">↑</button>
  </div>
  <div class="table-container">
    <div class="tbl-header tbl-fornec">
      <span class="left sortable" onclick="setSort('id_fornecedor')" data-col="id_fornecedor">ID <span class="sort-arrow"></span></span>
      <span class="left sortable" onclick="setSort('nome')" data-col="nome">Nome <span class="sort-arrow"></span></span>
      <span class="sortable" onclick="setSort('telefone')" data-col="telefone">Telefone <span class="sort-arrow"></span></span>
      <span class="sortable" onclick="setSort('email')" data-col="email">E-mail <span class="sort-arrow"></span></span>
      <span class="sortable" onclick="setSort('vendedor')" data-col="vendedor">Vendedor <span class="sort-arrow"></span></span>
      <span>Site</span>
      <span>Ações</span>
    </div>
    <div id="data-list"><div class="empty-state">Carregando fornecedores…</div></div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="mainModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('mainModal')">✕</button>
    <h2 id="modalTitle">Novo Fornecedor</h2>
    <div class="form-grid">
      <div class="form-group"><label>Nome *</label><input type="text" id="f-nome" placeholder="Nome da empresa"/></div>
      <div class="form-group"><label>Telefone</label><input type="text" id="f-telefone" placeholder="(00) 00000-0000"/></div>
      <div class="form-group"><label>E-mail</label><input type="email" id="f-email" placeholder="contato@fornecedor.com"/></div>
      <div class="form-group"><label>Site</label><input type="text" id="f-site" placeholder="www.exemplo.com"/></div>
      <div class="form-group"><label>Vendedor</label><input type="text" id="f-vendedor" placeholder="Nome do vendedor"/></div>
      <div class="form-group"><label>Telefone do Vendedor</label><input type="text" id="f-tel-vendedor" placeholder="(00) 00000-0000"/></div>
      <div class="form-group full"><label>Endereço</label><input type="text" id="f-endereco" placeholder="Rua, número, cidade…"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('mainModal')">Cancelar</button>
      <button class="btn" id="btnSalvar" onclick="saveItem()">Salvar Fornecedor</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="modal-overlay" id="confirmModal">
  <div class="confirm-modal">
    <button class="modal-close" onclick="closeModal('confirmModal')">✕</button>
    <p>Excluir o fornecedor</p>
    <span class="highlight" id="confirmNome"></span>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Cancelar</button>
      <button class="btn btn-danger" id="btnDel" onclick="deleteItem()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
if (!requireAuth()) throw new Error("redirect");

let allData=[], filtered=[], editingId=null, deletingId=null, currentPage=1;
let sortCol='nome', sortDir='asc';
const PAGE=15;

async function loadAll() {
  loadStart();
  try {
    const data = await supa('fornecedores?select=*&order=nome.asc');
    allData = data || []; filtered = [...allData]; applySort(); render();
  } catch(e) { toast('Erro: ' + e.message, true); document.getElementById('data-list').innerHTML = `<div class="empty-state">Erro: ${e.message}</div>`; }
  loadDone();
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  syncSortBar(); applySort(); render();
}
function setSortFromBar() { sortCol = document.getElementById('sortSelect').value; applySort(); render(); }
function toggleSortDir() { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; document.getElementById('sortDirBtn').textContent = sortDir === 'asc' ? '↑' : '↓'; applySort(); render(); }
function syncSortBar() {
  const sel = document.getElementById('sortSelect'); if (sel) sel.value = sortCol;
  const b = document.getElementById('sortDirBtn'); if (b) b.textContent = sortDir === 'asc' ? '↑' : '↓';
}
function applySort() {
  const dir = sortDir === 'asc' ? 1 : -1;
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * dir;
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    if (va < vb) return -1 * dir;
    if (va > vb) return  1 * dir;
    return 0;
  });
  document.querySelectorAll('.tbl-header .sortable').forEach(el => {
    const active = el.dataset.col === sortCol;
    el.classList.toggle('active', active);
    el.classList.toggle('asc', active && sortDir === 'asc');
  });
}

function filterData() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filtered = q ? allData.filter(x =>
    x.nome.toLowerCase().includes(q) ||
    (x.email || '').toLowerCase().includes(q) ||
    (x.vendedor || '').toLowerCase().includes(q) ||
    (x.telefone || '').includes(q)
  ) : [...allData];
  applySort();
  currentPage = 1; render();
}

function render() {
  const el = document.getElementById('data-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty-state">Nenhum fornecedor encontrado.</div>'; document.getElementById('pagination').innerHTML = ''; return; }
  const start = (currentPage - 1) * PAGE;
  const page = filtered.slice(start, start + PAGE);
  el.innerHTML = page.map(r => `
    <div class="data-row tbl-fornec">
      <span class="id-cell" data-label="ID">#${r.id_fornecedor}</span>
      <span class="left" data-label="Nome">${r.nome}</span>
      <span data-label="Telefone">${r.telefone || '—'}</span>
      <span data-label="E-mail" title="${r.email || ''}">${r.email || '—'}</span>
      <span data-label="Vendedor">${r.vendedor || '—'}</span>
      <span data-label="Site">${r.site ? `<a href="${r.site.startsWith('http') ? r.site : 'https://' + r.site}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:.82rem">${r.site}</a>` : '—'}</span>
      <span class="row-actions">
        <button class="btn-icon btn-edit-icon" onclick="openEdit(${r.id_fornecedor})" title="Editar"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5L11.5 4.5L5 11H3v-2L9.5 2.5Z" stroke="#856404" stroke-width="1.8" stroke-linejoin="round"/></svg></button>
        <button class="btn-icon btn-del-icon" onclick="openDel(${r.id_fornecedor})" title="Excluir"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2.5 4h9M5.5 4V2.5h3V4M6 6.5v4M8 6.5v4M3.5 4l.5 8h6l.5-8" stroke="#b71c1c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </span>
    </div>`).join('');
  buildPagination('pagination', currentPage, filtered.length, PAGE, 'goPage');
}

function goPage(p) { const t = Math.ceil(filtered.length / PAGE); if (p < 1 || p > t) return; currentPage = p; render(); }
function openModal(id) { document.getElementById(id).classList.add('visible'); }
function closeModal(id) { document.getElementById(id).classList.remove('visible'); if (id === 'mainModal') editingId = null; }

function openNewModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Novo Fornecedor';
  ['f-nome','f-telefone','f-email','f-site','f-vendedor','f-tel-vendedor','f-endereco'].forEach(i => document.getElementById(i).value = '');
  openModal('mainModal');
}

function openEdit(id) {
  const r = allData.find(x => x.id_fornecedor === id); if (!r) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar Fornecedor';
  document.getElementById('f-nome').value = r.nome || '';
  document.getElementById('f-telefone').value = r.telefone || '';
  document.getElementById('f-email').value = r.email || '';
  document.getElementById('f-site').value = r.site || '';
  document.getElementById('f-vendedor').value = r.vendedor || '';
  document.getElementById('f-tel-vendedor').value = r.telefone_vendedor || '';
  document.getElementById('f-endereco').value = r.endereco || '';
  openModal('mainModal');
}

function openDel(id) {
  const r = allData.find(x => x.id_fornecedor === id); if (!r) return;
  deletingId = id;
  document.getElementById('confirmNome').textContent = r.nome;
  openModal('confirmModal');
}

async function saveItem() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { toast('Nome obrigatório.', true); return; }
  const payload = {
    nome,
    telefone: document.getElementById('f-telefone').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    site: document.getElementById('f-site').value.trim() || null,
    vendedor: document.getElementById('f-vendedor').value.trim() || null,
    telefone_vendedor: document.getElementById('f-tel-vendedor').value.trim() || null,
    endereco: document.getElementById('f-endereco').value.trim() || null,
  };
  const btn = document.getElementById('btnSalvar'); btn.disabled = true; btn.textContent = 'Salvando…';
  loadStart();
  try {
    if (editingId) { await supa(`fornecedores?id_fornecedor=eq.${editingId}`, { method: 'PATCH', body: JSON.stringify(payload) }); toast('Fornecedor atualizado!'); }
    else { await supa('fornecedores', { method: 'POST', body: JSON.stringify(payload) }); toast('Fornecedor criado!'); }
    closeModal('mainModal'); await loadAll();
  } catch(e) { toast('Erro: ' + e.message, true); }
  btn.disabled = false; btn.textContent = 'Salvar Fornecedor';
  loadDone();
}

async function deleteItem() {
  const btn = document.getElementById('btnDel'); btn.disabled = true; btn.textContent = 'Excluindo…';
  loadStart();
  try {
    await supa(`insumo_fornecedor?id_fornecedor=eq.${deletingId}`, { method: 'DELETE' });
    await supa(`fornecedores?id_fornecedor=eq.${deletingId}`, { method: 'DELETE' });
    toast('Fornecedor excluído.'); closeModal('confirmModal'); await loadAll();
  } catch(e) { toast('Erro: ' + e.message, true); }
  btn.disabled = false; btn.textContent = 'Excluir';
  loadDone();
}

loadAll();
</script>
</body>
</html>

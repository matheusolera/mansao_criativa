<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relatórios – Casa Personalizada</title>
  <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @font-face {
      font-family: 'Higuen';
      src: url('https://fonts.cdnfonts.com/s/15399/HiguenElegantSerifDemo.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }

    :root {
      --sidebar-bg: #C0544E;
      --sidebar-text: #fff;
      --bg: #F7F0E8;
      --card-bg: #EDE0D0;
      --card-border: #C0877A;
      --text-dark: #5C2E28;
      --text-mid: #7A4A40;
      --chart-color: #7A4A3A;
      --font-display: 'Higuen', 'Playfair Display', Georgia, serif;
      --font-body: 'Bree Serif', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-dark);
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 210px;
      min-height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 24px 0;
      flex-shrink: 0;
    }

    .logo-svg-wrap {
      width: 90px;
      margin: 0 auto 32px auto;
      display: flex;
      justify-content: center;
    }

    .sidebar nav a {
      display: block;
      padding: 10px 28px;
      color: var(--sidebar-text);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: 0.97rem;
      transition: background 0.15s;
    }

    .sidebar nav a:hover,
    .sidebar nav a.active {
      background: rgba(255,255,255,0.15);
    }

    .main {
      flex: 1;
      padding: 40px 48px;
      overflow-y: auto;
    }

    h1.page-title {
      font-family: var(--font-display);
      font-size: 3.2rem;
      font-weight: 400;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 0.03em;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    .chart-card {
      background: var(--card-bg);
      border-radius: 18px;
      border: 2px solid var(--card-border);
      padding: 24px 28px 20px 28px;
    }

    .chart-card h2 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text-dark);
      margin-bottom: 18px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .chart-card canvas { max-height: 220px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo-svg-wrap"><img src="/img/logo.png" alt="Logo" style="width:80px;height:80px;object-fit:contain;"/></div>
  <nav>
    <a href="index.html" class="active">Relatórios</a>
    <a href="pedidos.html">Pedidos</a>
    <a href="#">Insumos</a>
    <a href="#">Produtos</a>
    <a href="#">Clientes</a>
    <a href="#">Fornecedores</a>
    <a href="#">Balanço</a>
  </nav>
</aside>

<main class="main">
  <h1 class="page-title">Relatórios</h1>

  <div class="charts-grid">
    <div class="chart-card">
      <h2>Receita Diária</h2>
      <canvas id="chartDiario"></canvas>
    </div>
    <div class="chart-card">
      <h2>Receita Mensal</h2>
      <canvas id="chartMensal"></canvas>
    </div>
    <div class="chart-card">
      <h2>Top Produtos</h2>
      <canvas id="chartProdutos"></canvas>
    </div>
    <div class="chart-card">
      <h2>Top Clientes</h2>
      <canvas id="chartClientes"></canvas>
    </div>
  </div>
</main>

<script>
  const cfg = (labels, data) => ({
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: '#7A4A3A',
        borderColor: '#5C2E28',
        borderWidth: 1.5,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#5C2E28',
          titleColor: '#F7F0E8',
          bodyColor: '#F7F0E8',
          titleFont: { family: 'Bree Serif' },
          bodyFont: { family: 'Bree Serif' },
        }
      },
      scales: {
        x: {
          ticks: { color: '#7A4A40', font: { family: 'Bree Serif', size: 12 } },
          grid: { color: 'rgba(192,135,122,0.2)' }
        },
        y: {
          ticks: { color: '#7A4A40', font: { family: 'Bree Serif', size: 12 } },
          grid: { color: 'rgba(192,135,122,0.2)' }
        }
      }
    }
  });

  new Chart(document.getElementById('chartDiario'),   cfg(['01','02','03','04'], [1000,1500,900,1500]));
  new Chart(document.getElementById('chartMensal'),   cfg(['01','02','03','04'], [1000,5000,4300,1300]));
  new Chart(document.getElementById('chartProdutos'), cfg(['Produto 1','Produto 2','Produto 3','Produto 4'], [1000,1500,800,1500]));
  new Chart(document.getElementById('chartClientes'), cfg(['Cliente 1','Cliente 2','Cliente 3','Cliente 4'], [3000,5000,4300,1500]));
</script>
</body>
</html>

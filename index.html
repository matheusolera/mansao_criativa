<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar – Casa Personalizada</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, #F7F0E8 0%, #EDE0D0 100%); }
    .login-shell { display: grid; grid-template-columns: 1fr 1fr; max-width: 880px; width: 100%; background: var(--bg); border-radius: 24px; border: 2px solid var(--card-border); overflow: hidden; box-shadow: 0 20px 60px rgba(92,46,40,.18); min-height: 520px; }
    .login-art { background: linear-gradient(135deg, #C0544E 0%, #a3433d 100%); color: #fff; padding: 48px 40px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
    .login-art::before { content: ''; position: absolute; top: -60px; right: -60px; width: 240px; height: 240px; background: rgba(255,255,255,.08); border-radius: 50%; }
    .login-art::after { content: ''; position: absolute; bottom: -80px; left: -40px; width: 200px; height: 200px; background: rgba(255,255,255,.05); border-radius: 50%; }
    .login-art .brand { position: relative; }
    .login-art .brand img { width: 140px; max-width: 100%; }
    .login-art .tagline { position: relative; font-family: var(--font-display); font-size: 2rem; line-height: 1.25; letter-spacing: .02em; }
    .login-art .copy { position: relative; font-family: var(--font-body); font-size: .9rem; opacity: .9; }
    .login-form-wrap { padding: 56px 56px; display: flex; flex-direction: column; justify-content: center; }
    .login-form-wrap h1 { font-family: var(--font-display); font-size: 2.4rem; color: var(--text-dark); margin-bottom: 8px; letter-spacing: .02em; }
    .login-form-wrap .subtitle { font-family: var(--font-body); font-size: .92rem; color: var(--text-mid); margin-bottom: 32px; }
    .input-group { position: relative; margin-bottom: 16px; }
    .input-group input { width: 100%; background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 12px; padding: 14px 16px 14px 46px; font-family: var(--font-body); font-size: .95rem; color: var(--text-dark); outline: none; transition: border-color .15s, box-shadow .15s; }
    .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(192,84,78,.12); }
    .input-group svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    .toggle-eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-mid); }
    .btn-login { width: 100%; padding: 14px; font-size: 1rem; margin-top: 12px; justify-content: center; }
    .error-msg { background: #fde8e8; border: 1.5px solid #f5c0c0; color: #b71c1c; padding: 10px 14px; border-radius: 10px; font-family: var(--font-body); font-size: .87rem; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; animation: shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .footer-note { text-align: center; font-family: var(--font-body); font-size: .78rem; color: var(--text-mid); margin-top: 28px; }
    @media (max-width: 720px) {
      .login-shell { grid-template-columns: 1fr; }
      .login-art { padding: 32px 28px; min-height: 200px; }
      .login-art .tagline { font-size: 1.4rem; }
      .login-form-wrap { padding: 36px 28px; }
    }
  </style>
</head>
<body>
<div class="login-shell">
  <aside class="login-art">
    <div class="brand"><img src="img/logo.png" alt="Logo"/></div>
    <div class="tagline">Sistema de Gestão.<br>Itens personalizados.</div>
    <div class="copy">Acesso restrito · use suas credenciais cadastradas</div>
  </aside>

  <section class="login-form-wrap">
    <h1>Entrar</h1>
    <p class="subtitle">Faça login para acessar o sistema.</p>

    <div class="error-msg" id="errMsg"></div>

    <form id="loginForm" autocomplete="on">
      <div class="input-group">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="4" width="14" height="10" rx="2" stroke="#7A4A40" stroke-width="1.5"/>
          <path d="M2 5l7 5 7-5" stroke="#7A4A40" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email"/>
      </div>

      <div class="input-group">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="3" y="8" width="12" height="8" rx="1.5" stroke="#7A4A40" stroke-width="1.5"/>
          <path d="M5.5 8V5.5a3.5 3.5 0 0 1 7 0V8" stroke="#7A4A40" stroke-width="1.5"/>
        </svg>
        <input type="password" id="senha" placeholder="Senha" required autocomplete="current-password"/>
        <button type="button" class="toggle-eye" onclick="toggleEye()" title="Mostrar/ocultar">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M1 9s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>

      <button type="submit" class="btn btn-login" id="btnLogin">
        Entrar
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>

    <p class="footer-note">Esqueceu sua senha? Solicite ao administrador.</p>
  </section>
</div>

<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
// Se já está logado, redireciona para o dashboard
const existing = getSession();
if (existing && !isTokenExpired(existing)) {
  window.location.href = 'relatorio.html';
}

function toggleEye() {
  const i = document.getElementById('senha');
  i.type = i.type === 'password' ? 'text' : 'password';
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.className = 'error-msg show';
}

function hideErr() {
  document.getElementById('errMsg').className = 'error-msg';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideErr();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  if (!email || !senha) return;

  const btn = document.getElementById('btnLogin');
  btn.disabled = true;
  btn.innerHTML = 'Entrando…';
  loadStart();

  try {
    await loginEmail(email, senha);
    toast('Login realizado!');
    setTimeout(() => window.location.href = 'relatorio.html', 400);
  } catch(err) {
    const msg = err.message || 'Falha no login';
    if (msg.toLowerCase().includes('invalid') || msg.toLowerCase().includes('credentials')) {
      showErr('E-mail ou senha incorretos.');
    } else {
      showErr(msg);
    }
    btn.disabled = false;
    btn.innerHTML = `Entrar <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    loadDone();
  }
});

document.getElementById('email').focus();
</script>
</body>
</html>

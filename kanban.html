<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kanban – Casa Personalizada</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── KANBAN ── */
    .kanban-board { display: flex; gap: 12px; align-items: flex-start; }
    .kanban-col { background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 14px; flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; max-height: calc(100vh - 190px); }
    .kanban-col-header { padding: 11px 12px; border-bottom: 2px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .kanban-col-title { font-family: var(--font-display); font-size: .98rem; color: var(--text-dark); letter-spacing: .01em; display: flex; align-items: center; gap: 6px; min-width: 0; }
    .kanban-col-title span:not(.kanban-col-dot) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .kanban-col-count { font-family: var(--font-body); font-size: .72rem; color: var(--text-mid); background: var(--inner-bg); border-radius: 20px; padding: 2px 8px; flex-shrink: 0; }
    .kanban-col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .col-novo       .kanban-col-dot { background: #6b7db3; }
    .col-a-fazer    .kanban-col-dot { background: #c79c00; }
    .col-fazendo    .kanban-col-dot { background: #1565c0; }
    .col-bloqueado  .kanban-col-dot { background: #b71c1c; }
    .col-finalizado .kanban-col-dot { background: #2e7d32; }

    .kanban-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; min-height: 50px; transition: background .15s; }
    .kanban-cards.drag-over { background: rgba(192,84,78,.06); }

    .kb-card { background: var(--inner-bg); border: 1.5px solid var(--card-border); border-radius: 10px; padding: 9px 10px; cursor: grab; transition: box-shadow .15s, transform .1s, border-color .15s; position: relative; touch-action: none; }
    .kb-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(92,46,40,.1); }
    .kb-card:active { cursor: grabbing; }
    .kb-card-nome { font-family: var(--font-body); font-weight: 600; font-size: .86rem; color: var(--text-dark); margin-bottom: 7px; line-height: 1.3; }
    .kb-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .kb-prio { font-family: var(--font-body); font-size: .66rem; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
    .kb-prio.baixa   { background: #e3f0e3; color: #2e7d32; }
    .kb-prio.media   { background: #e3ecf7; color: #1565c0; }
    .kb-prio.alta    { background: #fbeecf; color: #b07d00; }
    .kb-prio.urgente { background: #fbe0e0; color: #b71c1c; }
    .kb-horas { font-family: var(--font-body); font-size: .7rem; color: var(--text-mid); display: inline-flex; align-items: center; gap: 3px; }
    .kb-resp { margin-left: auto; display: inline-flex; align-items: center; gap: 5px; }
    .kb-resp-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-family: var(--font-body); font-size: .66rem; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
    .kb-resp-nome { font-family: var(--font-body); font-size: .7rem; color: var(--text-mid); }

    /* Card sendo arrastado (fantasma pendurado no mouse) */
    .kb-card.dragging-ghost { position: fixed; z-index: 999; pointer-events: none; box-shadow: 0 12px 30px rgba(92,46,40,.28); transform: rotate(2deg) scale(1.02); opacity: .95; border-color: var(--accent); }
    /* Espaço vazio deixado no lugar do card que está sendo arrastado */
    .kb-card.placeholder { background: rgba(192,135,122,.12); border: 1.5px dashed var(--card-border); box-shadow: none; }
    .kb-card.placeholder * { visibility: hidden; }

    .kb-add-btn { background: none; border: 1.5px dashed var(--card-border); border-radius: 9px; padding: 8px; color: var(--text-mid); font-family: var(--font-body); font-size: .78rem; cursor: pointer; transition: background .14s, color .14s; margin: 0 10px 10px; }
    .kb-add-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); border-style: solid; }

    .kb-empty { text-align: center; color: var(--text-mid); font-family: var(--font-body); font-size: .76rem; padding: 16px 6px; opacity: .7; }

    /* Modal de detalhes */
    .prio-select-group, .status-select-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .prio-opt { flex: 1; min-width: 70px; text-align: center; padding: 8px; border-radius: 10px; border: 1.5px solid var(--card-border); background: var(--card-bg); font-family: var(--font-body); font-size: .84rem; cursor: pointer; transition: all .14s; }
    .prio-opt.sel { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 600; }

    @media (max-width: 820px) {
      .kanban-board { flex-direction: column; }
      .kanban-col { width: 100%; max-height: none; }
      .kb-card.dragging-ghost { width: 82vw !important; }
    }
  </style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<aside class="sidebar">
  <div class="logo-svg-wrap"><img src="img/logo.png" alt="Logo" style="width:150px;height:80px;object-fit:contain;"/></div>
  <nav>
    <a href="relatorio.html">Relatórios</a>
    <a href="pedidos.html">Pedidos</a>
    <a href="insumos.html">Insumos</a>
    <a href="compras.html">Compras</a>
    <a href="produtos.html">Produtos</a>
    <a href="clientes.html">Clientes</a>
    <a href="fornecedores.html">Fornecedores</a>
    <a href="kanban.html" class="active">Kanban</a>
    <a href="balanco.html">Balanço</a>
    <a href="financeiro.html">Financeiro</a>
  </nav>
</aside>
<main class="main">
  <h1 class="page-title">Kanban</h1>

  <div class="kanban-board" id="board"></div>
</main>

<!-- MODAL DE DETALHES DO CARD -->
<div class="modal-overlay" id="cardModal">
  <div class="modal wide">
    <button class="modal-close" onclick="closeModal('cardModal')">✕</button>
    <h2 id="cardModalTitle">Nova Tarefa</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nome da Tarefa *</label>
        <input type="text" id="c-nome" placeholder="Ex: Comprar tecido para pedido #12"/>
      </div>
      <div class="form-group full">
        <label>Descrição</label>
        <textarea id="c-descricao" rows="3" placeholder="Detalhes da tarefa (opcional)" style="width:100%;background:var(--inner-bg);border:1.5px solid var(--card-border);border-radius:10px;padding:10px 12px;font-family:var(--font-body);font-size:.9rem;color:var(--text-dark);outline:none;resize:vertical"></textarea>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="c-status">
          <option value="Novo">Novo</option>
          <option value="A fazer">A fazer</option>
          <option value="Fazendo">Fazendo</option>
          <option value="Bloqueado">Bloqueado</option>
          <option value="Finalizado">Finalizado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Responsável</label>
        <select id="c-responsavel"><option value="">Sem responsável</option></select>
      </div>
      <div class="form-group full">
        <label>Prioridade</label>
        <div class="prio-select-group" id="c-prio-group">
          <div class="prio-opt" data-prio="baixa"   onclick="selectPrio('baixa')">Baixa</div>
          <div class="prio-opt" data-prio="media"   onclick="selectPrio('media')">Média</div>
          <div class="prio-opt" data-prio="alta"    onclick="selectPrio('alta')">Alta</div>
          <div class="prio-opt" data-prio="urgente" onclick="selectPrio('urgente')">Urgente</div>
        </div>
      </div>
      <div class="form-group">
        <label>Horas Estimadas</label>
        <input type="number" id="c-horas" step="0.5" min="0" placeholder="0"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDelCard" onclick="openDelCard()" style="margin-right:auto;display:none">Excluir</button>
      <button class="btn btn-secondary" onclick="closeModal('cardModal')">Cancelar</button>
      <button class="btn" id="btnSaveCard" onclick="saveCard()">Salvar</button>
    </div>
  </div>
</div>

<!-- CONFIRM EXCLUSÃO -->
<div class="modal-overlay" id="confirmModal">
  <div class="confirm-modal">
    <button class="modal-close" onclick="closeModal('confirmModal')">✕</button>
    <p>Excluir a tarefa</p>
    <span class="highlight" id="confirmNome"></span>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Cancelar</button>
      <button class="btn btn-danger" id="btnConfirmDel" onclick="deleteCard()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
if (!requireAuth()) throw new Error("redirect");

const STATUSES = ['Novo', 'A fazer', 'Fazendo', 'Bloqueado', 'Finalizado'];
const STATUS_CLASS = { 'Novo': 'col-novo', 'A fazer': 'col-a-fazer', 'Fazendo': 'col-fazendo', 'Bloqueado': 'col-bloqueado', 'Finalizado': 'col-finalizado' };
const PRIO_LABEL = { baixa: 'Baixa', media: 'Média', alta: 'Alta', urgente: 'Urgente' };

let cards = [], usuarios = [];
let editingCard = null, deletingCard = null, selectedPrio = 'media';

async function loadAll() {
  loadStart();
  try {
    const [cds, users] = await Promise.all([
      supa('kanban_cards?select=*&order=ordem.asc'),
      supa('usuarios?select=*&order=nome.asc'),
    ]);
    cards = cds || []; usuarios = users || [];
    populateRespSelect();
    renderBoard();
  } catch(e) {
    toast('Erro: ' + e.message, true);
    document.getElementById('board').innerHTML = `<div class="kb-empty">Erro ao carregar: ${e.message}</div>`;
  }
  loadDone();
}

function usuarioNome(id) {
  const u = usuarios.find(x => x.id_usuario === id);
  return u ? u.nome : null;
}
function iniciais(nome) {
  if (!nome) return '?';
  const partes = nome.trim().split(/\s+/);
  return (partes[0][0] + (partes[1] ? partes[1][0] : '')).toUpperCase();
}

function populateRespSelect() {
  document.getElementById('c-responsavel').innerHTML =
    '<option value="">Sem responsável</option>' +
    usuarios.map(u => `<option value="${u.id_usuario}">${u.nome}</option>`).join('');
}

// ── RENDER ──
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = STATUSES.map(status => {
    const doStatus = cards.filter(c => c.status === status).sort((a,b) => a.ordem - b.ordem);
    return `
      <div class="kanban-col ${STATUS_CLASS[status]}" data-status="${status}">
        <div class="kanban-col-header">
          <span class="kanban-col-title"><span class="kanban-col-dot"></span>${status}</span>
          <span class="kanban-col-count">${doStatus.length}</span>
        </div>
        <div class="kanban-cards" data-status="${status}">
          ${doStatus.length ? doStatus.map(c => cardHTML(c)).join('') : '<div class="kb-empty">Nenhuma tarefa</div>'}
        </div>
        <button class="kb-add-btn" onclick="openNewCard('${status}')">+ Nova tarefa</button>
      </div>`;
  }).join('');
  attachDragHandlers();
}

function cardHTML(c) {
  const nome = usuarioNome(c.id_responsavel);
  const respHTML = nome
    ? `<span class="kb-resp"><span class="kb-resp-avatar" title="${nome}">${iniciais(nome)}</span></span>`
    : '';
  const horasHTML = c.horas_estimadas > 0
    ? `<span class="kb-horas">⏱ ${fmtHoras(c.horas_estimadas)}</span>`
    : '';
  return `
    <div class="kb-card" data-id="${c.id_card}" onclick="openEditCard(${c.id_card})">
      <div class="kb-card-nome">${escapeHTML(c.nome)}</div>
      <div class="kb-card-meta">
        <span class="kb-prio ${c.prioridade}">${PRIO_LABEL[c.prioridade] || c.prioridade}</span>
        ${horasHTML}
        ${respHTML}
      </div>
    </div>`;
}

function fmtHoras(h) {
  const n = parseFloat(h) || 0;
  return (Number.isInteger(n) ? n : n.toFixed(1).replace('.', ',')) + 'h';
}
function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

// ── MODAL ──
function openModal(id) { document.getElementById(id).classList.add('visible'); }
function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

function selectPrio(p) {
  selectedPrio = p;
  document.querySelectorAll('#c-prio-group .prio-opt').forEach(el => {
    el.classList.toggle('sel', el.dataset.prio === p);
  });
}

function openNewCard(status) {
  editingCard = null;
  document.getElementById('cardModalTitle').textContent = 'Nova Tarefa';
  document.getElementById('c-nome').value = '';
  document.getElementById('c-descricao').value = '';
  document.getElementById('c-status').value = status || 'Novo';
  document.getElementById('c-responsavel').value = '';
  document.getElementById('c-horas').value = '';
  selectPrio('media');
  document.getElementById('btnDelCard').style.display = 'none';
  openModal('cardModal');
  setTimeout(() => document.getElementById('c-nome').focus(), 50);
}

function openEditCard(id) {
  const c = cards.find(x => x.id_card === id);
  if (!c) return;
  editingCard = id;
  document.getElementById('cardModalTitle').textContent = 'Editar Tarefa';
  document.getElementById('c-nome').value = c.nome || '';
  document.getElementById('c-descricao').value = c.descricao || '';
  document.getElementById('c-status').value = c.status;
  document.getElementById('c-responsavel').value = c.id_responsavel || '';
  document.getElementById('c-horas').value = c.horas_estimadas || '';
  selectPrio(c.prioridade || 'media');
  document.getElementById('btnDelCard').style.display = 'inline-flex';
  openModal('cardModal');
}

async function saveCard() {
  const nome = document.getElementById('c-nome').value.trim();
  if (!nome) { toast('Informe o nome da tarefa.', true); return; }
  const status = document.getElementById('c-status').value;
  const payload = {
    nome,
    descricao: document.getElementById('c-descricao').value.trim() || null,
    status,
    prioridade: selectedPrio,
    horas_estimadas: parseFloat(document.getElementById('c-horas').value) || 0,
    id_responsavel: document.getElementById('c-responsavel').value || null,
  };

  const btn = document.getElementById('btnSaveCard');
  btn.disabled = true; btn.textContent = 'Salvando…';
  loadStart();
  try {
    if (editingCard) {
      await supa(`kanban_cards?id_card=eq.${editingCard}`, { method: 'PATCH', body: JSON.stringify(payload) });
      toast('Tarefa atualizada!');
    } else {
      // nova: ordem = fim da coluna
      const naColuna = cards.filter(c => c.status === status);
      payload.ordem = naColuna.length ? Math.max(...naColuna.map(c => c.ordem)) + 1 : 1;
      await supa('kanban_cards', { method: 'POST', body: JSON.stringify(payload) });
      toast('Tarefa criada!');
    }
    closeModal('cardModal');
    await loadAll();
  } catch(e) { toast('Erro: ' + e.message, true); }
  btn.disabled = false; btn.textContent = 'Salvar';
  loadDone();
}

function openDelCard() {
  if (!editingCard) return;
  deletingCard = editingCard;
  const c = cards.find(x => x.id_card === editingCard);
  document.getElementById('confirmNome').textContent = c ? c.nome : '';
  openModal('confirmModal');
}

async function deleteCard() {
  const btn = document.getElementById('btnConfirmDel');
  btn.disabled = true; btn.textContent = 'Excluindo…';
  loadStart();
  try {
    await supa(`kanban_cards?id_card=eq.${deletingCard}`, { method: 'DELETE' });
    toast('Tarefa excluída.');
    closeModal('confirmModal');
    closeModal('cardModal');
    await loadAll();
  } catch(e) { toast('Erro: ' + e.message, true); }
  btn.disabled = false; btn.textContent = 'Excluir';
  loadDone();
}

// ══════════════════════════════════════════════════════════
//  DRAG-AND-DROP fluido (pointer events)
// ══════════════════════════════════════════════════════════
let drag = null;

function attachDragHandlers() {
  document.querySelectorAll('.kb-card').forEach(card => {
    card.addEventListener('pointerdown', onPointerDown);
  });
}

function onPointerDown(e) {
  // só botão esquerdo / toque
  if (e.button !== undefined && e.button !== 0) return;
  const card = e.currentTarget;
  const id = parseInt(card.dataset.id);

  // Guarda posição inicial para distinguir clique de arraste
  const startX = e.clientX, startY = e.clientY;
  let started = false;

  const rect = card.getBoundingClientRect();
  const offsetX = e.clientX - rect.left;
  const offsetY = e.clientY - rect.top;

  function move(ev) {
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    if (!started) {
      // inicia o arraste só após mover um pouco (evita conflito com clique)
      if (Math.hypot(dx, dy) < 6) return;
      started = true;
      beginDrag(card, id, rect, offsetX, offsetY);
    }
    duringDrag(ev);
  }

  function up(ev) {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    if (started) {
      ev.stopPropagation();
      endDrag(ev);
      // impede o onclick de abrir o modal logo após soltar
      card.addEventListener('click', stopClickOnce, true);
    }
  }
  function stopClickOnce(ce) { ce.stopPropagation(); ce.preventDefault(); card.removeEventListener('click', stopClickOnce, true); }

  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
}

function beginDrag(card, id, rect, offsetX, offsetY) {
  const ghost = card;
  // cria placeholder no lugar
  const placeholder = card.cloneNode(true);
  placeholder.classList.add('placeholder');
  placeholder.removeAttribute('onclick');
  card.parentNode.insertBefore(placeholder, card);

  ghost.classList.add('dragging-ghost');
  ghost.style.width = rect.width + 'px';   // mantém a largura real do card
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  document.body.appendChild(ghost);

  drag = { id, ghost, placeholder, offsetX, offsetY };
}

function duringDrag(ev) {
  if (!drag) return;
  drag.ghost.style.left = (ev.clientX - drag.offsetX) + 'px';
  drag.ghost.style.top = (ev.clientY - drag.offsetY) + 'px';

  // Descobre sob qual coluna e posição está o cursor
  const colEl = document.elementsFromPoint(ev.clientX, ev.clientY).find(el => el.classList.contains('kanban-cards'));
  document.querySelectorAll('.kanban-cards').forEach(c => c.classList.remove('drag-over'));
  if (!colEl) return;
  colEl.classList.add('drag-over');

  // remove "nenhuma tarefa"
  const empty = colEl.querySelector('.kb-empty');
  if (empty) empty.remove();

  // acha o card mais próximo abaixo do cursor para inserir o placeholder
  const outros = [...colEl.querySelectorAll('.kb-card:not(.placeholder):not(.dragging-ghost)')];
  let alvo = null;
  for (const c of outros) {
    const r = c.getBoundingClientRect();
    if (ev.clientY < r.top + r.height / 2) { alvo = c; break; }
  }
  if (alvo) colEl.insertBefore(drag.placeholder, alvo);
  else colEl.appendChild(drag.placeholder);
}

async function endDrag(ev) {
  if (!drag) return;
  const { id, ghost, placeholder } = drag;
  const colEl = placeholder.parentNode;
  const novoStatus = colEl.dataset.status;

  // calcula nova ordem com base nos vizinhos do placeholder
  const irmaos = [...colEl.querySelectorAll('.kb-card:not(.dragging-ghost)')];
  const idx = irmaos.indexOf(placeholder);
  const antes = irmaos[idx - 1];
  const depois = irmaos[idx + 1];
  const ordemAntes = antes ? cardOrdem(antes) : null;
  const ordemDepois = depois ? cardOrdem(depois) : null;

  let novaOrdem;
  if (ordemAntes == null && ordemDepois == null) novaOrdem = 1;
  else if (ordemAntes == null) novaOrdem = ordemDepois - 1;
  else if (ordemDepois == null) novaOrdem = ordemAntes + 1;
  else novaOrdem = (ordemAntes + ordemDepois) / 2;

  // limpa o ghost e placeholder
  ghost.classList.remove('dragging-ghost');
  ghost.removeAttribute('style');
  placeholder.parentNode.replaceChild(ghost, placeholder);
  document.querySelectorAll('.kanban-cards').forEach(c => c.classList.remove('drag-over'));

  const card = cards.find(c => c.id_card === id);
  const mudou = card && (card.status !== novoStatus || card.ordem !== novaOrdem);
  drag = null;

  if (!card || !mudou) { renderBoard(); return; }

  // atualiza local e persiste
  card.status = novoStatus;
  card.ordem = novaOrdem;
  renderBoard();
  try {
    await supa(`kanban_cards?id_card=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: novoStatus, ordem: novaOrdem }),
    });
  } catch(e) {
    toast('Erro ao mover: ' + e.message, true);
    await loadAll();
  }
}

function cardOrdem(el) {
  const c = cards.find(x => x.id_card === parseInt(el.dataset.id));
  return c ? c.ordem : 0;
}

loadAll();
</script>
</body>
</html>

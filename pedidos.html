<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedidos – Casa Personalizada</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<aside class="sidebar">
  <div class="logo-svg-wrap"><img src="img/logo.png" alt="Logo" style="width:150px;height:80px;object-fit:contain;"/></div>
  <nav>
    <a href="index.html">Relatórios</a>
    <a href="pedidos.html" class="active">Pedidos</a>
    <a href="insumos.html">Insumos</a>
    <a href="produtos.html">Produtos</a>
    <a href="clientes.html">Clientes</a>
    <a href="fornecedores.html">Fornecedores</a>
    <a href="#">Balanço</a>
  </nav>
</aside>

<main class="main">
  <h1 class="page-title">Pedidos</h1>

  <div class="actions">
    <button class="btn" onclick="openNewModal()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg>
      Novo
    </button>
    <button class="btn" onclick="openEditModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5L11.5 4.5L5 11H3v-2L9.5 2.5Z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/></svg>
      Editar
    </button>
    <button class="btn" onclick="openConfirmDelete()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 4h9M5.5 4V2.5h3V4M6 6.5v4M8 6.5v4M3.5 4l.5 8h6l.5-8" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Excluir
    </button>
  </div>

  <div class="table-container">
    <div class="tbl-header">
      <span>Nº Pedido</span><span>Valor</span><span>Pagamento</span>
      <span>Cliente</span><span>Data Pedido</span><span>Data Receb.</span><span>Status</span>
    </div>
    <div id="orders-list"><div class="empty-state">Carregando pedidos…</div></div>
  </div>
</main>

<!-- MODAL NOVO/EDITAR -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('orderModal')" title="Fechar">✕</button>
    <h2 id="modalTitle">Novo Pedido</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Cliente *</label>
        <select id="f-cliente"><option value="">Carregando clientes…</option></select>
      </div>
      <div class="form-group">
        <label>Forma de Pagamento</label>
        <select id="f-pagamento">
          <option value="PIX">PIX</option>
          <option value="Cartão de Crédito">Cartão de Crédito</option>
          <option value="Cartão de Débito">Cartão de Débito</option>
          <option value="Boleto">Boleto</option>
          <option value="Dinheiro">Dinheiro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="Pendente">Pendente</option>
          <option value="Finalizado">Finalizado</option>
          <option value="Cancelado">Cancelado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Valor Total (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0"/>
      </div>
      <div class="form-group">
        <label>Data do Pedido</label>
        <input type="date" id="f-data-pedido"/>
      </div>
      <div class="form-group">
        <label>Data de Recebimento</label>
        <input type="date" id="f-data-recebimento"/>
      </div>
    </div>

    <div class="products-section">
      <h3>Produtos do Pedido</h3>
      <div class="prod-col-header">
        <span>Produto</span><span>Qtd</span><span>Preço Unit.</span><span></span>
      </div>
      <div id="modal-products"></div>
      <button class="btn-add-product" onclick="addProductRow()">+ Adicionar produto</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('orderModal')">Cancelar</button>
      <button class="btn" id="btnSalvar" onclick="saveOrder()">Salvar Pedido</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR EXCLUSÃO -->
<div class="modal-overlay" id="confirmModal">
  <div class="confirm-modal">
    <button class="modal-close" onclick="closeModal('confirmModal')" title="Fechar">✕</button>
    <p>Tem certeza que deseja excluir este pedido?<br>Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Cancelar</button>
      <button class="btn btn-danger" id="btnConfirmDelete" onclick="deleteSelected()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://ctueqxlhbtfzvocwohjf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dWVxeGxoYnRmenZvY3dvaGpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjQyMTMsImV4cCI6MjA5NTE0MDIxM30.VikphOEMgR4QgDOLQkneZWOC2XdgbFvoXyAn1rsDsec';

const hdrs = {
  'apikey': SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function supa(path, options = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: hdrs, ...options });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.hint || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// STATE
let orders      = [];
let clientes    = [];
let produtos    = [];
let selectedId  = null;
let editingId   = null;
let expandedIds = new Set();
let expandCache = {};

// UTILS
function loadStart() { const b = document.getElementById('loadingBar'); b.className = 'loading-bar active'; }
function loadDone()  { const b = document.getElementById('loadingBar'); b.className = 'loading-bar done'; setTimeout(() => b.className = 'loading-bar', 400); }

function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3200);
}

function fmtDate(d) {
  if (!d) return '—';
  // yyyy-mm-dd → dd-mm-yyyy
  const parts = d.split('T')[0].split('-');
  if (parts.length === 3 && parts[0].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
  return d;
}
function toInputDate(d) {
  if (!d) return '';
  const s = d.split('T')[0];
  const parts = s.split('-');
  if (parts[0].length === 2) return `${parts[2]}-${parts[1]}-${parts[0]}`;
  return s;
}
function fmtMoney(v) { return Number(v || 0).toFixed(2).replace('.', ','); }
function statusKey(s) {
  if (s === 'Finalizado') return 's-finalizado';
  if (s === 'Cancelado')  return 's-cancelado';
  return 's-pendente';
}
function clienteNome(id_cliente) {
  const c = clientes.find(x => x.id_cliente === id_cliente);
  if (!c) return '—';
  return `${c.nome}${c.sobrenome ? ' '+c.sobrenome : ''}`;
}

// LOAD ALL
async function loadAll() {
  loadStart();
  try {
    // Fetch pedidos, clientes e produtos em paralelo — SEM join para evitar problema de RLS
    const [ped, cli, prod] = await Promise.all([
      supa('pedidos?select=*&order=id_pedido.desc'),
      supa('clientes?select=id_cliente,nome,sobrenome&order=nome.asc'),
      supa('produtos?select=id_produto,nome,preco_unitario&order=nome.asc'),
    ]);
    orders   = ped  || [];
    clientes = cli  || [];
    produtos = prod || [];
    populateClienteSelect();
    render();
  } catch(e) {
    toast('Erro ao carregar dados: ' + e.message, true);
    document.getElementById('orders-list').innerHTML =
      `<div class="empty-state">Erro: ${e.message}</div>`;
  }
  loadDone();
}

function populateClienteSelect() {
  const sel = document.getElementById('f-cliente');
  if (!clientes.length) {
    sel.innerHTML = '<option value="">Nenhum cliente cadastrado</option>';
    return;
  }
  sel.innerHTML = '<option value="">Selecione um cliente…</option>' +
    clientes.map(c => `<option value="${c.id_cliente}">${c.nome}${c.sobrenome ? ' '+c.sobrenome : ''}</option>`).join('');
}

// RENDER
function render() {
  const container = document.getElementById('orders-list');
  if (!orders.length) {
    container.innerHTML = '<div class="empty-state">Nenhum pedido encontrado.</div>';
    return;
  }

  container.innerHTML = orders.map(o => {
    const isExpanded = expandedIds.has(o.id_pedido);
    const isSelected = selectedId === o.id_pedido;
    const sk = statusKey(o.status);
    const cached = expandCache[o.id_pedido];

    let expandedHtml = '';
    if (isExpanded) {
      if (cached === undefined) {
        expandedHtml = `<div class="products-expand visible" id="expand-${o.id_pedido}"><div class="prod-loading">Carregando produtos…</div></div>`;
        loadProdutosPedido(o.id_pedido);
      } else if (!cached.length) {
        expandedHtml = `<div class="products-expand visible" id="expand-${o.id_pedido}"><div class="prod-loading">Nenhum produto neste pedido.</div></div>`;
      } else {
        expandedHtml = `
          <div class="products-expand visible" id="expand-${o.id_pedido}">
            <div class="prod-header">
              <span>ID Produto</span><span>Nome</span><span>Quantidade</span><span>Preço Unit.</span><span>Preço Total</span>
            </div>
            ${cached.map(p => `
              <div class="prod-row">
                <span>${p.id_produto}</span>
                <span>${p.produtos?.nome || getNomeProduto(p.id_produto)}</span>
                <span>${p.quantidade}</span>
                <span>R$ ${fmtMoney(p.preco_unitario)}</span>
                <span>R$ ${fmtMoney(p.preco_total)}</span>
              </div>`).join('')}
          </div>`;
      }
    }

    return `
      <div class="order-block">
        <div class="order-row${isSelected ? ' selected-row' : ''}" onclick="selectRow(${o.id_pedido})">
          <span class="toggle-cell">
            <button class="toggle-btn ${isExpanded ? 'open' : ''}" onclick="toggleExpand(event,${o.id_pedido})">
              <svg width="12" height="8" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" stroke="#5C2E28" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
            #${o.id_pedido}
          </span>
          <span>R$ ${fmtMoney(o.valor)}</span>
          <span>${o.forma_pagamento || '—'}</span>
          <span>${clienteNome(o.id_cliente)}</span>
          <span>${fmtDate(o.data_pedido)}</span>
          <span>${fmtDate(o.data_recebimento)}</span>
          <span class="status-wrap">
            <select class="status-select ${sk}" onchange="changeStatus(event,${o.id_pedido})" onclick="event.stopPropagation()">
              <option value="Pendente"   ${o.status==='Pendente'   ?'selected':''}>Pendente</option>
              <option value="Finalizado" ${o.status==='Finalizado' ?'selected':''}>Finalizado</option>
              <option value="Cancelado"  ${o.status==='Cancelado'  ?'selected':''}>Cancelado</option>
            </select>
          </span>
        </div>
        ${expandedHtml}
      </div>`;
  }).join('');
}

function getNomeProduto(id) {
  const p = produtos.find(x => x.id_produto === id);
  return p ? p.nome : '—';
}

async function loadProdutosPedido(id_pedido) {
  try {
    // busca produtos_pedido + join com produtos
    const data = await supa(`produto_pedido?select=*,produtos(nome)&id_pedido=eq.${id_pedido}`);
    expandCache[id_pedido] = data || [];
    render();
  } catch(e) {
    expandCache[id_pedido] = [];
    toast('Erro ao carregar produtos do pedido.', true);
    render();
  }
}

// SELECT / EXPAND
function selectRow(id) { selectedId = (selectedId === id) ? null : id; render(); }

function toggleExpand(e, id) {
  e.stopPropagation();
  if (expandedIds.has(id)) { expandedIds.delete(id); }
  else { expandedIds.add(id); }
  render();
}

// CHANGE STATUS
async function changeStatus(e, id_pedido) {
  e.stopPropagation();
  const newStatus = e.target.value;
  const el = e.target;
  el.disabled = true;
  try {
    await supa(`pedidos?id_pedido=eq.${id_pedido}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus })
    });
    const o = orders.find(x => x.id_pedido === id_pedido);
    if (o) o.status = newStatus;
    el.className = 'status-select ' + statusKey(newStatus);
    toast('Status atualizado!');
  } catch(err) {
    toast('Erro ao atualizar status: ' + err.message, true);
  }
  el.disabled = false;
}

// MODALS
function openModal(id)  { document.getElementById(id).classList.add('visible'); }
function closeModal(id) { document.getElementById(id).classList.remove('visible'); if (id === 'orderModal') editingId = null; }

function openNewModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Novo Pedido';
  populateClienteSelect();
  document.getElementById('f-cliente').value = '';
  document.getElementById('f-pagamento').value = 'PIX';
  document.getElementById('f-status').value = 'Pendente';
  document.getElementById('f-valor').value = '';
  document.getElementById('f-data-pedido').value = '';
  document.getElementById('f-data-recebimento').value = '';
  document.getElementById('modal-products').innerHTML = '';
  addProductRow();
  openModal('orderModal');
}

function openEditModal() {
  if (!selectedId) { toast('Selecione um pedido para editar.', true); return; }
  const o = orders.find(x => x.id_pedido === selectedId);
  editingId = o.id_pedido;
  document.getElementById('modalTitle').textContent = 'Editar Pedido #' + o.id_pedido;
  populateClienteSelect();
  document.getElementById('f-cliente').value = o.id_cliente || '';
  document.getElementById('f-pagamento').value = o.forma_pagamento || 'PIX';
  document.getElementById('f-status').value = o.status || 'Pendente';
  document.getElementById('f-valor').value = o.valor || '';
  document.getElementById('f-data-pedido').value = toInputDate(o.data_pedido);
  document.getElementById('f-data-recebimento').value = toInputDate(o.data_recebimento);
  const prodContainer = document.getElementById('modal-products');
  prodContainer.innerHTML = '';
  const cached = expandCache[o.id_pedido];
  if (cached && cached.length) cached.forEach(p => addProductRow(p));
  else addProductRow();
  openModal('orderModal');
}

function openConfirmDelete() {
  if (!selectedId) { toast('Selecione um pedido para excluir.', true); return; }
  openModal('confirmModal');
}

// PRODUCT ROWS
function addProductRow(p = {}) {
  const container = document.getElementById('modal-products');
  const div = document.createElement('div');
  div.className = 'prod-entry';
  const opts = produtos.map(pr =>
    `<option value="${pr.id_produto}" data-preco="${pr.preco_unitario}" ${p.id_produto == pr.id_produto ? 'selected' : ''}>${pr.nome}</option>`
  ).join('');
  div.innerHTML = `
    <select class="p-produto" onchange="fillPreco(this)">
      <option value="">Selecione um produto…</option>${opts}
    </select>
    <input type="number" placeholder="Qtd" value="${p.quantidade || ''}" class="p-qtd" min="1"/>
    <input type="number" placeholder="R$ 0,00" value="${p.preco_unitario || ''}" class="p-preco" step="0.01" min="0"/>
    <button class="btn-remove" onclick="this.parentElement.remove()" title="Remover">✕</button>
  `;
  container.appendChild(div);
}

function fillPreco(sel) {
  const preco = sel.options[sel.selectedIndex]?.dataset?.preco || '';
  sel.closest('.prod-entry').querySelector('.p-preco').value = preco;
}

// SAVE
async function saveOrder() {
  const id_cliente       = parseInt(document.getElementById('f-cliente').value);
  const forma_pagamento  = document.getElementById('f-pagamento').value;
  const status           = document.getElementById('f-status').value;
  const valor            = parseFloat(document.getElementById('f-valor').value) || 0;
  const data_pedido      = document.getElementById('f-data-pedido').value || null;
  const data_recebimento = document.getElementById('f-data-recebimento').value || null;

  if (!id_cliente) { toast('Selecione um cliente.', true); return; }

  const prods = [...document.querySelectorAll('#modal-products .prod-entry')]
    .map(div => ({
      id_produto:     parseInt(div.querySelector('.p-produto').value),
      quantidade:     parseInt(div.querySelector('.p-qtd').value) || 0,
      preco_unitario: parseFloat(div.querySelector('.p-preco').value) || 0,
      preco_total:    (parseInt(div.querySelector('.p-qtd').value)||0) * (parseFloat(div.querySelector('.p-preco').value)||0),
    }))
    .filter(p => p.id_produto && p.quantidade > 0);

  const btn = document.getElementById('btnSalvar');
  btn.disabled = true; btn.textContent = 'Salvando…';
  loadStart();

  try {
    if (editingId) {
      await supa(`pedidos?id_pedido=eq.${editingId}`, {
        method: 'PATCH',
        body: JSON.stringify({ id_cliente, forma_pagamento, status, valor, data_pedido, data_recebimento })
      });
      await supa(`produto_pedido?id_pedido=eq.${editingId}`, { method: 'DELETE' });
      if (prods.length) {
        await supa('produto_pedido', {
          method: 'POST',
          body: JSON.stringify(prods.map(p => ({ ...p, id_pedido: editingId })))
        });
      }
      delete expandCache[editingId];
      toast('Pedido atualizado!');
    } else {
      const [newPedido] = await supa('pedidos', {
        method: 'POST',
        body: JSON.stringify({ id_cliente, forma_pagamento, status, valor, data_pedido, data_recebimento })
      });
      if (prods.length) {
        await supa('produto_pedido', {
          method: 'POST',
          body: JSON.stringify(prods.map(p => ({ ...p, id_pedido: newPedido.id_pedido })))
        });
      }
      toast('Pedido criado!');
    }
    closeModal('orderModal');
    await loadAll();
  } catch(e) {
    toast('Erro ao salvar: ' + e.message, true);
  }

  btn.disabled = false; btn.textContent = 'Salvar Pedido';
  loadDone();
}

// DELETE
async function deleteSelected() {
  if (!selectedId) return;
  const btn = document.getElementById('btnConfirmDelete');
  btn.disabled = true; btn.textContent = 'Excluindo…';
  loadStart();
  try {
    await supa(`produto_pedido?id_pedido=eq.${selectedId}`, { method: 'DELETE' });
    await supa(`pedidos?id_pedido=eq.${selectedId}`, { method: 'DELETE' });
    expandedIds.delete(selectedId);
    delete expandCache[selectedId];
    selectedId = null;
    closeModal('confirmModal');
    toast('Pedido excluído.');
    await loadAll();
  } catch(e) {
    toast('Erro ao excluir: ' + e.message, true);
  }
  btn.disabled = false; btn.textContent = 'Excluir';
  loadDone();
}

loadAll();
</script>
</body>
</html>
